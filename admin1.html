<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ-панель | Портфолио 3D</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jura:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue: #001166;
      --cream: #f0f0e7;
    }

    body {
      font-family: "Jura", sans-serif;
      background: var(--blue);
      padding: 40px;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 48px;
      color: var(--cream);
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 30px;
      color: var(--cream);
      text-decoration: none;
      border: 1px solid var(--cream);
      padding: 8px 20px;
      border-radius: 30px;
      transition: 0.2s;
    }

    .back-link:hover {
      background: var(--cream);
      color: var(--blue);
    }

    .add-btn {
      background: var(--cream);
      color: var(--blue);
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 30px;
      transition: 0.2s;
    }

    .add-btn:hover {
      transform: scale(1.02);
    }

    .projects-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .project-card {
      background: var(--cream);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .project-preview {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
    }

    .project-info {
      flex: 1;
      min-width: 200px;
    }

    .project-info h3 {
      color: var(--blue);
      font-size: 20px;
      margin-bottom: 8px;
    }

    .project-info p {
      color: var(--blue);
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .project-actions {
      display: flex;
      gap: 10px;
    }

    .edit-btn, .delete-btn {
      padding: 8px 20px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: 0.2s;
    }

    .edit-btn {
      background: var(--blue);
      color: var(--cream);
    }

    .delete-btn {
      background: #cc3333;
      color: white;
    }

    .edit-btn:hover, .delete-btn:hover {
      transform: scale(1.02);
    }

    /* Модальное окно для добавления/редактирования */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--cream);
      border-radius: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 30px;
    }

    .modal-content h2 {
      color: var(--blue);
      margin-bottom: 20px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid var(--blue);
      border-radius: 12px;
      font-family: "Jura", sans-serif;
      background: white;
    }

    .modal-content textarea {
      min-height: 80px;
      resize: vertical;
    }

    .gallery-input {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .gallery-input label {
      color: var(--blue);
      font-size: 12px;
      display: block;
      margin-bottom: 5px;
    }

    .save-btn {
      background: var(--blue);
      color: var(--cream);
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    .close-modal {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: var(--blue);
    }
  </style>
</head>

<body>
  <div class="admin-container">
    <a href="index.html" class="back-link">← На главную</a>
    <h1>Админ-панель портфолио</h1>
    <button class="add-btn" id="addBtn">+ Добавить проект</button>

    <div id="projectsList" class="projects-list"></div>
  </div>

  <!-- Модальное окно для редактирования/добавления -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2 id="modalTitle">Добавить проект</h2>
      <input type="text" id="projectTitle" placeholder="Название проекта">
      <input type="text" id="projectShortDesc" placeholder="Краткое описание">
      <textarea id="projectFullDesc" placeholder="Полное описание"></textarea>
      <input type="text" id="projectMainImg" placeholder="Ссылка на главное фото">
      
      <div class="gallery-input">
        <label>Галерея фото (ссылки через запятую)</label>
        <textarea id="projectGallery" placeholder="https://example.com/photo1.jpg, https://example.com/photo2.jpg"></textarea>
      </div>

      <button class="save-btn" id="saveBtn">Сохранить</button>
    </div>
  </div>

  <script>
    let projects = [];
    let editingId = null;

    function loadProjects() {
      const saved = localStorage.getItem('portfolio_projects');
      if (saved) {
        projects = JSON.parse(saved);
      } else {
        projects = [
          { id: 1, title: "Современная гостиная", shortDesc: "Интерьер в стиле минимализм", fullDesc: "Современная гостиная в светлых тонах с акцентной стеной. Использованы натуральные материалы: дерево, камень, текстиль.", mainImg: "https://images.unsplash.com/photo-1618219740975-4098bb2e1b01?w=600", gallery: ["https://images.unsplash.com/photo-1618219740975-4098bb2e1b01?w=600", "https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=600"] },
          { id: 2, title: "Кухня-столовая", shortDesc: "Светлые тона, уют", fullDesc: "Кухня-столовая в скандинавском стиле. Много света, белые фасады, деревянные акценты.", mainImg: "https://images.unsplash.com/photo-1616486338812-3badae4b4b75?w=600", gallery: ["https://images.unsplash.com/photo-1616486338812-3badae4b4b75?w=600", "https://images.unsplash.com/photo-1556912172-45b7abe8b7e1?w=600"] },
          { id: 3, title: "Спальня в скандинавском стиле", shortDesc: "Мягкий свет", fullDesc: "Спальня с акцентом на уют. Пастельные тона, деревянные элементы, мягкое освещение.", mainImg: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=600", gallery: ["https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=600", "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=600"] }
        ];
        saveProjects();
      }
      renderProjects();
    }

    function saveProjects() {
      localStorage.setItem('portfolio_projects', JSON.stringify(projects));
    }

    function renderProjects() {
      const container = document.getElementById('projectsList');
      container.innerHTML = '';
      projects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
          <img class="project-preview" src="${project.mainImg}" alt="${project.title}">
          <div class="project-info">
            <h3>${project.title}</h3>
            <p>${project.shortDesc}</p>
            <p>📷 ${project.gallery.length} фото в галерее</p>
          </div>
          <div class="project-actions">
            <button class="edit-btn" data-id="${project.id}">✏️ Редактировать</button>
            <button class="delete-btn" data-id="${project.id}">🗑️ Удалить</button>
          </div>
        `;
        container.appendChild(card);
      });

      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = parseInt(btn.dataset.id);
          editProject(id);
        });
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = parseInt(btn.dataset.id);
          if (confirm('Удалить проект?')) {
            projects = projects.filter(p => p.id !== id);
            saveProjects();
            renderProjects();
          }
        });
      });
    }

    function editProject(id) {
      const project = projects.find(p => p.id === id);
      if (!project) return;
      editingId = id;
      document.getElementById('modalTitle').innerText = 'Редактировать проект';
      document.getElementById('projectTitle').value = project.title;
      document.getElementById('projectShortDesc').value = project.shortDesc;
      document.getElementById('projectFullDesc').value = project.fullDesc;
      document.getElementById('projectMainImg').value = project.mainImg;
      document.getElementById('projectGallery').value = project.gallery.join(', ');
      document.getElementById('modal').classList.add('active');
    }

    function addNewProject() {
      editingId = null;
      document.getElementById('modalTitle').innerText = 'Добавить проект';
      document.getElementById('projectTitle').value = '';
      document.getElementById('projectShortDesc').value = '';
      document.getElementById('projectFullDesc').value = '';
      document.getElementById('projectMainImg').value = '';
      document.getElementById('projectGallery').value = '';
      document.getElementById('modal').classList.add('active');
    }

    function saveProject() {
      const title = document.getElementById('projectTitle').value.trim();
      const shortDesc = document.getElementById('projectShortDesc').value.trim();
      const fullDesc = document.getElementById('projectFullDesc').value.trim();
      const mainImg = document.getElementById('projectMainImg').value.trim();
      const galleryStr = document.getElementById('projectGallery').value.trim();
      const gallery = galleryStr ? galleryStr.split(',').map(s => s.trim()) : [];

      if (!title || !mainImg) {
        alert('Заполните название и главное фото');
        return;
      }

      if (editingId) {
        const index = projects.findIndex(p => p.id === editingId);
        if (index !== -1) {
          projects[index] = { ...projects[index], title, shortDesc, fullDesc, mainImg, gallery };
        }
      } else {
        const newId = Math.max(0, ...projects.map(p => p.id)) + 1;
        projects.push({ id: newId, title, shortDesc, fullDesc, mainImg, gallery });
      }

      saveProjects();
      renderProjects();
      closeModal();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.getElementById('addBtn').addEventListener('click', addNewProject);
    document.getElementById('saveBtn').addEventListener('click', saveProject);
    document.querySelector('.close-modal').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    loadProjects();
  </script>
</body>
</html>
